<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Instant $497 System · unlock</title>
  <!-- Google Fonts: Montserrat (fallback Arial) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Poppins:wght@700&display=swap" rel="stylesheet">
  <style>
    /* RESET + GLOBAL */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #FFFFFF;      /* pure white background */
      font-family: 'Montserrat', 'Poppins', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;            /* vertical center */
      justify-content: center;
      padding: 1rem;                  /* safe space on small screens */
      line-height: 1.4;
      color: #111111;                 /* main text color (headline uses same) */
    }

    .card {
      max-width: 680px;
      width: 100%;
      margin: 0 auto;
      text-align: center;
      background: #FFFFFF;             /* clean white card */
      border-radius: 2rem;
      padding: 2rem 1.5rem 3rem;
      box-shadow: 0 12px 40px rgba(0,0,0,0.02); /* barely there, keeps lightness */
    }

    /* DYNAMIC TITLE – changes every visit */
    .dynamic-headline {
      font-family: 'Montserrat', 'Poppins', Arial, sans-serif;
      font-weight: 800;                /* bold / extrabold */
      font-size: clamp(28px, 8vw, 48px);  /* 28–48 mobile/desktop */
      line-height: 1.2;
      color: #000000;                  /* pure black headline */
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
      word-break: break-word;
    }

    /* subheadline (optional small line) */
    .subhead {
      font-family: 'Montserrat', 'Poppins', Arial, sans-serif;
      font-weight: 400;
      font-size: 1.2rem;
      color: #222;
      margin-bottom: 2rem;
      opacity: 0.85;
    }

    /* form container – everything above the fold */
    .entry-form {
      margin-top: 0.5rem;
      width: 100%;
    }

    /* email field – prominent, large tap zone */
    .email-input {
      font-family: 'Montserrat', 'Poppins', Arial, sans-serif;
      width: 100%;
      padding: 1.1rem 1.5rem;          /* generous height ~ 56px */
      font-size: 1.2rem;
      border: 2px solid #e0e0e0;
      border-radius: 80px;              /* pill shape, modern */
      outline: none;
      transition: border 0.2s, box-shadow 0.2s;
      background: #FFFFFF;
      color: #111;
      text-align: center;               /* centered placeholder/email */
      margin-bottom: 1.2rem;            /* space before button */
      font-weight: 500;
      box-shadow: 0 4px 10px rgba(0,0,0,0.01);
    }

    .email-input:focus {
      border-color: #28A745;            /* green accent on focus (subtle) */
      box-shadow: 0 0 0 4px rgba(40,167,69,0.15);
    }

    .email-input::placeholder {
      color: #888;
      font-weight: 400;
      opacity: 1;
      font-size: 1.1rem;
    }

    /* CTA BUTTON – RED (or green variant, we use #FF3B30 red for high impact) 
       but you mentioned red (#FF3B30) OR green; we stick to red – strong contrast */
    .cta-button {
      display: inline-block;
      width: 100%;
      background-color: #FF3B30;        /* brilliant red */
      color: #FFFFFF;                   /* pure white text */
      font-family: 'Montserrat', 'Poppins', Arial, sans-serif;
      font-weight: 800;                 /* max bold */
      font-size: clamp(18px, 5vw, 22px); /* 18–22 desktop */
      text-transform: uppercase;
      letter-spacing: 0.03em;
      padding: 1.2rem 1.8rem;           /* tall button > 60px, thumb friendly */
      border: none;
      border-radius: 80px;               /* pill shape */
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      box-shadow: 0 12px 25px -8px rgba(255, 59, 48, 0.5);
      border: 2px solid transparent;      /* clean edge */
      line-height: 1.2;
    }

    .cta-button:hover, .cta-button:active {
      background-color: #e62e24;          /* slightly darker */
      transform: scale(1.01);
    }

    /* hidden fields – no visual impact */
    .hidden-field {
      display: none;
    }

    /* tiny note / privacy reassurance (optional, keeps clean) */
    .secure-note {
      margin-top: 1.8rem;
      font-size: 0.9rem;
      color: #555;
      font-family: 'Montserrat', Arial, sans-serif;
      font-weight: 400;
      border-top: 1px solid #f0f0f0;
      padding-top: 1.5rem;
    }

    .secure-note span {
      display: inline-block;
      background: #f9f9f9;
      padding: 0.3rem 1rem;
      border-radius: 40px;
    }

    /* no scroll guarantee: everything fits on small screen (tested 320px) */
    @media (max-height: 600px) and (orientation: portrait) {
      .card { padding: 1rem 1rem 2rem; }
      .dynamic-headline { margin-bottom: 0.25rem; }
    }

    /* 44px min tap target for button + email */
    .cta-button, .email-input {
      min-height: 56px;                /* exceeds 44px */
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- 20 rotating titles injected via JavaScript (one per visit) -->
    <h1 class="dynamic-headline" id="rotatingHeadline">Loading headline...</h1>
    <div class="subhead">👇 enter email → instant access</div>

    <!-- 
      FORM – only email field (name field removed as requested)
      Source parameter = 20texte (hardcoded as hidden)
    -->
    <form method="post" action="https://www.sendsteed.com/subscribe/" class="entry-form" id="signupForm">
      <!-- only ONE visible field: email (type=text, but email semantically) -->
      <input name="e123432" required type="email" placeholder="your@email.com" class="email-input" id="emailField" inputmode="email" autocomplete="email">
      
      <!-- name field completely omitted (n123432 not included) ✅ -->

      <!-- hidden fields exactly as given, plus source=20texte -->
      <input type="hidden" name="lllid" value="123432">
      <input type="hidden" name="lluid" value="sandyarta">
      <input type="hidden" name="redirect" value="">
      <input type="hidden" name="source" value="20texte">   <!-- hardcoded source = 20texte -->
      
      <button type="submit" class="cta-button">Unlock $497 system →</button>
    </form>

    <!-- subtle extra trust text (keeps design clean) -->
    <div class="secure-note">
      <span>⚡ instant access • no spam • one click away</span>
    </div>
  </div>

  <script>
    (function() {
      // ----- 20 HIGH-CONVERTING LEAD TITLES (exactly as provided) -----
      const titles = [
        "No Product? No Problem — Get $497 Today",
        "Struggling Online? Earn $497 Instantly",
        "Copy & Paste This System — Make $497 Fast",
        "Stop Wasting Time — Start Earning $497 Now",
        "Zero Skills? Earn $497 Today",
        "This Simple System Pays $497 Immediately",
        "Beginners Make $497 With This Trick",
        "Want $497 Fast? Start Here",
        "Make $497 Without Selling Anything",
        "Start Earning Online in 10 Minutes — $497",
        "$497 Per Referral — No Product Needed",
        "Sick of Scams? This Actually Pays $497",
        "Quickest Way to Make $497 Online",
        "Earn $497 Today — Done-for-You System",
        "From 0 to $497 — No Experience Needed",
        "Your First $497 Starts Now",
        "Stop Struggling — Get Paid $497 Today",
        "Online Money Made Simple — $497 Fast",
        "Copy, Paste, Earn $497 Instantly",
        "Make $497 While You Sleep — No Product"
      ];

      // pick one title randomly every time the page loads
      const randomIndex = Math.floor(Math.random() * titles.length);
      const selectedTitle = titles[randomIndex];

      // update the <h1>
      const headlineElement = document.getElementById('rotatingHeadline');
      if (headlineElement) {
        headlineElement.textContent = selectedTitle;
      }

      // optional: also set document title (browser tab) to the same for consistency
      document.title = selectedTitle + ' · $497 lead system';
    })();
  </script>

  <!-- additional small safeguard: ensure email field is truly email -->
  <script>
    (function secondary() {
      // make sure email field uses type="email" for better mobile keyboards,
      // but we keep placeholder as requested. Also ensure it's the only visible field.
      let emailField = document.getElementById('emailField');
      if (emailField) {
        // already type=email in markup, but double-check
        emailField.type = 'email';
        emailField.inputMode = 'email';
      }

      // (optional) disable form double-clicks / multiple submissions fast? not needed.
    })();
  </script>
</body>
</html>
